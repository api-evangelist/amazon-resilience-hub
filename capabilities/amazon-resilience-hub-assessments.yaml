naftiko: 1.0.0-alpha2
info:
  label: Amazon Resilience Hub — Assessments
  description: 'Amazon Resilience Hub — Assessments. 3 operations. Lead operation: Amazon Resilience Hub Describe App Assessment.
    Self-contained Naftiko capability covering one Amazon Resilience Hub business surface.'
  tags:
  - Amazon Resilience Hub
  - Assessments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_RESILIENCE_HUB_API_KEY: AMAZON_RESILIENCE_HUB_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-resilience-hub-assessments
    baseUri: https://resiliencehub.amazonaws.com
    description: Amazon Resilience Hub — Assessments business capability. Self-contained, no shared references.
    resources:
    - name: describe-app-assessment
      path: /describe-app-assessment
      operations:
      - name: describeappassessment
        method: POST
        description: Amazon Resilience Hub Describe App Assessment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: list-app-assessments
      path: /list-app-assessments
      operations:
      - name: listappassessments
        method: GET
        description: Amazon Resilience Hub List App Assessments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appArn
          in: query
          type: string
          description: Amazon Resource Name (ARN) of the application.
        - name: assessmentName
          in: query
          type: string
          description: The name for the assessment.
        - name: assessmentStatus
          in: query
          type: array
          description: The current status of the assessment for the resiliency policy.
        - name: maxResults
          in: query
          type: integer
        - name: nextToken
          in: query
          type: string
    - name: start-app-assessment
      path: /start-app-assessment
      operations:
      - name: startappassessment
        method: POST
        description: Amazon Resilience Hub Start App Assessment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_RESILIENCE_HUB_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-resilience-hub-assessments-rest
    port: 8080
    description: REST adapter for Amazon Resilience Hub — Assessments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/describe-app-assessment
      name: describe-app-assessment
      description: REST surface for describe-app-assessment.
      operations:
      - method: POST
        name: describeappassessment
        description: Amazon Resilience Hub Describe App Assessment
        call: amazon-resilience-hub-assessments.describeappassessment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/list-app-assessments
      name: list-app-assessments
      description: REST surface for list-app-assessments.
      operations:
      - method: GET
        name: listappassessments
        description: Amazon Resilience Hub List App Assessments
        call: amazon-resilience-hub-assessments.listappassessments
        with:
          appArn: rest.appArn
          assessmentName: rest.assessmentName
          assessmentStatus: rest.assessmentStatus
          maxResults: rest.maxResults
          nextToken: rest.nextToken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/start-app-assessment
      name: start-app-assessment
      description: REST surface for start-app-assessment.
      operations:
      - method: POST
        name: startappassessment
        description: Amazon Resilience Hub Start App Assessment
        call: amazon-resilience-hub-assessments.startappassessment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-resilience-hub-assessments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Resilience Hub — Assessments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: amazon-resilience-hub-describe-app
      description: Amazon Resilience Hub Describe App Assessment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-resilience-hub-assessments.describeappassessment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-resilience-hub-list-app
      description: Amazon Resilience Hub List App Assessments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-resilience-hub-assessments.listappassessments
      with:
        appArn: tools.appArn
        assessmentName: tools.assessmentName
        assessmentStatus: tools.assessmentStatus
        maxResults: tools.maxResults
        nextToken: tools.nextToken
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-resilience-hub-start-app
      description: Amazon Resilience Hub Start App Assessment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-resilience-hub-assessments.startappassessment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
