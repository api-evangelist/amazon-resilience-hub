    description: Amazon Resilience Hub — Applications business capability. Self-contained, no shared references.
    resources:
    - name: create-app
      path: /create-app
      operations:
      - name: createapp
        method: POST
        description: Amazon Resilience Hub Create App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: delete-app
      path: /delete-app
      operations:
      - name: deleteapp
        method: DELETE
        description: Amazon Resilience Hub Delete App
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appArn
          in: query
          type: string
          description: The Amazon Resource Name (ARN) of the application.
          required: true
        - name: forceDelete
          in: query
          type: boolean
          description: A boolean option to override the failure when deleting an unprotected app.
    - name: describe-app
      path: /describe-app
      operations:
      - name: describeapp
        method: POST
        description: Amazon Resilience Hub Describe App
        outputRawFormat: json
        outputParameters:
        - name: result
