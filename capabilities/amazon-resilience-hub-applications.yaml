      - name: listappversions
        method: GET
        description: Amazon Resilience Hub List App Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appArn
          in: query
          type: string
          description: The Amazon Resource Name (ARN) of the application.
          required: true
        - name: maxResults
          in: query
          type: integer
        - name: nextToken
          in: query
          type: string
    - name: list-apps
      path: /list-apps
      operations:
      - name: listapps
        method: GET
        description: Amazon Resilience Hub List Apps
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: appArn
          in: query
          type: string
          description: The Amazon Resource Name (ARN) of the app.
        - name: maxResults
          in: query
          type: integer
          description: Maximum number of results to include in the response.
        - name: nextToken
          in: query
          type: string
          description: Null, or the token from a previous call to get the next set of results.
        - name: name
          in: query
          type: string
          description: The name for the one of the listed applications.
