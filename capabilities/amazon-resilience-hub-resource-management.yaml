    port: 9090
    transport: http
    description: MCP adapter for Amazon Resilience Hub — Resource Management. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-resilience-hub-add-draft
      description: Amazon Resilience Hub Add Draft App Version Resource Mappings
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-resilience-hub-resource-management.adddraftappversionresourcemappings
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-resilience-hub-import-resources
      description: Amazon Resilience Hub Import Resources to Draft App Version
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-resilience-hub-resource-management.importresourcestodraftappversion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-resilience-hub-resolve-app
      description: Amazon Resilience Hub Resolve App Version Resources
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: amazon-resilience-hub-resource-management.resolveappversionresources
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
