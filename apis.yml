aid: amazon-resilience-hub
name: Amazon Resilience Hub
description: AWS Resilience Hub provides a central place to define, validate, and track the resilience of your AWS applications.
  It assesses your application against your Recovery Time Objective (RTO) and Recovery Point Objective (RPO) targets and provides
  actionable recommendations to improve resilience.
