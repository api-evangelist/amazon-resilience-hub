  /list-apps:
    get:
      operationId: listApps
      summary: Amazon Resilience Hub List Apps
      description: Lists your Resilience Hub applications.
      tags:
        - Applications
      parameters:
        - name: appArn
          in: query
          schema:
            type: string
          description: The Amazon Resource Name (ARN) of the app.
        - name: maxResults
          in: query
          schema:
            type: integer
          description: Maximum number of results to include in the response.
          example: 20
        - name: nextToken
          in: query
          schema:
            type: string
          description: Null, or the token from a previous call to get the next set of results.
        - name: name
          in: query
          schema:
            type: string
          description: The name for the one of the listed applications.
      responses:
        '200':
          description: Applications listed successfully.
