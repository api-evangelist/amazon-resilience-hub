        - Applications
      parameters:
        - name: appArn
          in: query
          required: true
          schema:
            type: string
          description: The Amazon Resource Name (ARN) of the application.
        - name: forceDelete
          in: query
          schema:
            type: boolean
          description: A boolean option to override the failure when deleting an unprotected app.
      responses:
        '200':
          description: Application deleted successfully.
          content:
