components:
  schemas:
    ResiliencyTargets:
      type: object
      description: Defines RTO and RPO targets for a disruption type.
      properties:
        rtoInSecs:
          type: integer
          description: Recovery Time Objective in seconds.
          example: 300
        rpoInSecs:
          type: integer
          description: Recovery Point Objective in seconds.
          example: 60
    ResiliencyPolicy:
      type: object
      description: Defines a resiliency policy with RTO and RPO targets per disruption type.
      properties:
        policyArn:
          type: string
          description: The Amazon Resource Name (ARN) of the resiliency policy.
          example: arn:aws:resiliencehub:us-east-1:123456789012:resiliency-policy/abc123
        policyName:
          type: string
          description: The name of the policy.
          example: mission-critical-policy
        policyDescription:
          type: string
          description: The description for the policy.
        dataLocationConstraint:
          type: string
          enum:
            - AnyLocation
            - SameContinent
            - SameCountry
        tier:
          type: string
          description: The tier for this resiliency policy.
          enum:
            - MissionCritical
            - Critical
            - Important
            - CoreServices
            - NonCritical
            - NotApplicable
          example: MissionCritical
        policy:
          type: object
          description: The resiliency policy for disruption types.
          additionalProperties:
            $ref: '#/components/schemas/ResiliencyTargets'
        creationTime:
          type: string
          format: date-time
        estimatedCostTier:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
    App:
      type: object
      description: Defines an AWS Resilience Hub application.
      properties:
        appArn:
          type: string
          description: The Amazon Resource Name (ARN) of the application.
          example: arn:aws:resiliencehub:us-east-1:123456789012:app/my-app
        name:
          type: string
          description: The name for the application.
          example: my-resilient-app
        description:
          type: string
          description: The optional description for an app.
        policyArn:
          type: string
          description: The Amazon Resource Name (ARN) of the resiliency policy.
        creationTime:
          type: string
          format: date-time
        complianceStatus:
          type: string
          enum:
            - PolicyBreached
            - PolicyMet
            - NotAssessed
            - ChangesDetected
        lastAppComplianceEvaluationTime:
          type: string
          format: date-time
        resiliencyScore:
          type: number
          format: float
        tags:
          type: object
          additionalProperties:
            type: string
        assessmentSchedule:
          type: string
          enum:
            - Disabled
            - Daily
    Assessment:
      type: object
      description: Defines an assessment for an AWS Resilience Hub application.
      properties:
        appArn:
          type: string
          description: The Amazon Resource Name (ARN) of the application.
        appVersion:
          type: string
          description: The version of the application.
        assessmentArn:
          type: string
          description: The Amazon Resource Name (ARN) of the assessment.
          example: arn:aws:resiliencehub:us-east-1:123456789012:app-assessment/abc123
        assessmentName:
          type: string
          description: The name of the assessment.
        assessmentStatus:
          type: string
          enum:
            - Pending
            - InProgress
            - Failed
            - Success
          example: Success
        complianceStatus:
          type: string
          enum:
            - PolicyBreached
            - PolicyMet
          example: PolicyMet
        invoker:
          type: string
          enum:
            - User
            - System
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        cost:
          type: object
        resiliencyScore:
          type: number
          format: float
        compliance:
          type: object
        message:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
    CreateAppRequest:
      type: object
      required:
        - name
      description: Request to create an AWS Resilience Hub application.
      properties:
        name:
          type: string
          description: The name for the application.
          example: my-resilient-app
        description:
          type: string
          description: The optional description for an app.
        policyArn:
          type: string
          description: The Amazon Resource Name (ARN) of the resiliency policy.
        tags:
          type: object
          additionalProperties:
            type: string
        assessmentSchedule:
          type: string
          enum:
            - Disabled
            - Daily
        clientToken:
          type: string
    CreateAppResponse:
      type: object
      description: Response from creating an application.
      properties:
        app:
          $ref: '#/components/schemas/App'
    AppArnRequest:
      type: object
      required:
        - appArn
      description: Request containing an application ARN.
      properties:
        appArn:
          type: string
          description: The Amazon Resource Name (ARN) of the application.
          example: arn:aws:resiliencehub:us-east-1:123456789012:app/my-app
    DescribeAppResponse:
      type: object
      properties:
        app:
          $ref: '#/components/schemas/App'
    ListAppsResponse:
      type: object
      properties:
        appSummaries:
          type: array
          description: The summaries for the Resilience Hub application.
          items:
            $ref: '#/components/schemas/App'
        nextToken:
          type: string
    DeleteAppResponse:
      type: object
      properties:
        appArn:
          type: string
    StartAppAssessmentRequest:
      type: object
      required:
        - appArn
        - appVersion
        - assessmentName
      properties:
        appArn:
          type: string
          description: The Amazon Resource Name (ARN) of the application.
        appVersion:
          type: string
          description: The version of the application.
          example: release
        assessmentName:
          type: string
          description: The name for the assessment.
          example: my-assessment
        clientToken:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
    StartAppAssessmentResponse:
      type: object
      properties:
        assessment:
          $ref: '#/components/schemas/Assessment'
    AssessmentArnRequest:
      type: object
      required:
        - assessmentArn
      properties:
        assessmentArn:
          type: string
          description: The Amazon Resource Name (ARN) of the assessment.
          example: arn:aws:resiliencehub:us-east-1:123456789012:app-assessment/abc123
    DescribeAppAssessmentResponse:
      type: object
      properties:
        assessment:
          $ref: '#/components/schemas/Assessment'
    ListAppAssessmentsResponse:
      type: object
      properties:
        assessmentSummaries:
          type: array
          items:
            $ref: '#/components/schemas/Assessment'
        nextToken:
          type: string
    CreateResiliencyPolicyRequest:
      type: object
      required:
        - policyName
        - tier
        - policy
      properties:
        policyName:
          type: string
          description: The name of the policy.
          example: my-resilience-policy
        policyDescription:
          type: string
        dataLocationConstraint:
          type: string
          enum:
            - AnyLocation
            - SameContinent
            - SameCountry
        tier:
          type: string
          enum:
            - MissionCritical
            - Critical
            - Important
            - CoreServices
            - NonCritical
            - NotApplicable
        policy:
          type: object
          description: The resiliency policy per disruption type.
          additionalProperties:
            $ref: '#/components/schemas/ResiliencyTargets'
        clientToken:
          type: string
        tags:
          type: object
          additionalProperties:
            type: string
    CreateResiliencyPolicyResponse:
      type: object
      properties:
        policy:
          $ref: '#/components/schemas/ResiliencyPolicy'
    PolicyArnRequest:
      type: object
      required:
        - policyArn
      properties:
        policyArn:
          type: string
          description: The Amazon Resource Name (ARN) of the resiliency policy.
          example: arn:aws:resiliencehub:us-east-1:123456789012:resiliency-policy/abc123
    DescribeResiliencyPolicyResponse:
      type: object
      properties:
        policy:
          $ref: '#/components/schemas/ResiliencyPolicy'
    ListResiliencyPoliciesResponse:
      type: object
      properties:
        resiliencyPolicies:
          type: array
          items:
            $ref: '#/components/schemas/ResiliencyPolicy'
        nextToken:
          type: string
    AssessmentArnPaginationRequest:
      type: object
      required:
        - assessmentArn
      properties:
        assessmentArn:
          type: string
          description: The Amazon Resource Name (ARN) of the assessment.
        maxResults:
          type: integer
          example: 20
        nextToken:
          type: string
    ListRecommendationsResponse:
      type: object
      properties:
        alarmRecommendations:
          type: array
          items:
            type: object
        sopRecommendations:
          type: array
          items:
            type: object
        testRecommendations:
          type: array
          items:
            type: object
        nextToken:
          type: string
    ResourceMapping:
      type: object
      description: Defines a resource mapping for an app version.
      properties:
        resourceName:
          type: string
        logicalStackName:
          type: string
        mappingType:
          type: string
          enum:
            - CfnStack
            - Resource
            - AppRegistryApp
            - ResourceGroup
            - Terraform
            - EKS
        physicalResourceId:
          type: object
          properties:
            identifier:
              type: string
            type:
              type: string
              enum:
                - Arn
                - Native
        appRegistryAppName:
          type: string
        resourceGroupName:
          type: string
    AddResourceMappingsRequest:
      type: object
      required:
        - appArn
        - resourceMappings
      properties:
        appArn:
          type: string
        resourceMappings:
          type: array
          items:
            $ref: '#/components/schemas/ResourceMapping'
    AddResourceMappingsResponse:
      type: object
      properties:
        appArn:
          type: string
        appVersion:
          type: string
        resourceMappings:
          type: array
          items:
            $ref: '#/components/schemas/ResourceMapping'
    PublishAppVersionResponse:
      type: object
      properties:
        appArn:
          type: string
        appVersion:
          type: string
        identifier:
          type: integer
    ImportResourcesRequest:
      type: object
      required:
        - appArn
      properties:
        appArn:
          type: string
        sourceArns:
          type: array
          items:
            type: string
        terraformSources:
          type: array
          items:
            type: object
            properties:
              s3StateFileUrl:
                type: string
        importStrategy:
          type: string
          enum:
            - AddOnly
            - ReplaceAll
        eksSources:
          type: array
          items:
            type: object
    ImportResourcesResponse:
      type: object
      properties:
        appArn:
          type: string
        appVersion:
          type: string
        status:
          type: string
          enum:
            - Pending
            - InProgress
            - Failed
            - Success
    AppVersionRequest:
      type: object
      required:
        - appArn
        - appVersion
      properties:
        appArn:
          type: string
        appVersion:
          type: string
          example: release
    ResolveResourcesResponse:
      type: object
      properties:
        appArn:
          type: string
        appVersion:
          type: string
        resolutionId:
          type: string
        status:
          type: string
          enum:
            - Pending
            - InProgress
            - Failed
            - Success
    TagResourceRequest:
      type: object
      required:
        - tags
      properties:
        tags:
          type: object
          additionalProperties:
            type: string
    ListTagsResponse:
      type: object
      properties:
        tags:
          type: object
          additionalProperties:
            type: string
    ListAppVersionsResponse:
      type: object
      properties:
        appVersions:
          type: array
          items:
            type: object
            properties:
              appVersion:
                type: string
              identifier:
                type: integer
              creationTime:
                type: string
                format: date-time
        nextToken:
          type: string
    EmptyResponse:
      type: object
      properties: {}
    ErrorResponse:
      type: object
      description: Standard error response from Amazon Resilience Hub.
      properties:
        message:
          type: string
          description: Error message.
          example: An error occurred.
        code:
          type: string
          description: Error code.
  securitySchemes:
    aws_signature:
      type: apiKey
      in: header
      name: Authorization
      description: AWS Signature Version 4 authentication.

tags:
  - name: Applications
    description: Create and manage Resilience Hub applications.
  - name: Assessments
    description: Run and retrieve resilience assessments.
  - name: Resiliency Policies
    description: Define RTO and RPO targets for applications.
  - name: Recommendations
    description: Retrieve alarm, SOP, and test recommendations.
  - name: Resource Management
    description: Map and import resources into app versions.
  - name: Tags
    description: Manage resource tags.
