openapi: 3.0.3
info:
  title: Amazon Resilience Hub
  description: AWS Resilience Hub provides a central place to define, validate, and track the resilience of your AWS applications, assessing against RTO and RPO targets and providing actionable recommendations.
  version: '2020-04-30'
  contact:
    name: AWS Support
    url: https://aws.amazon.com/contact-us/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  x-generated-from: documentation
servers:
  - url: https://resiliencehub.amazonaws.com
    description: Amazon Resilience Hub API endpoint
paths:
  /create-app:
    post:
      operationId: createApp
      summary: Amazon Resilience Hub Create App
      description: Creates an AWS Resilience Hub application. A Resilience Hub application is a collection of AWS resources structured to prevent and recover AWS application disruptions.
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppRequest'
            examples:
              createAppRequest:
                summary: Default createApp request
                x-microcks-default: true
                value:
                  name: my-resilient-app
                  description: My application for resilience testing
                  policyArn: arn:aws:resiliencehub:us-east-1:123456789012:resiliency-policy/abc123
      responses:
        '200':
          description: Application created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAppResponse'
              examples:
                createApp200:
                  summary: Default createApp 200 response
                  x-microcks-default: true
                  value:
                    app:
                      appArn: arn:aws:resiliencehub:us-east-1:123456789012:app/my-resilient-app
                      name: my-resilient-app
                      complianceStatus: NotAssessed
                      creationTime: '2026-04-19T14:30:00Z'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - aws_signature: []
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /describe-app:
