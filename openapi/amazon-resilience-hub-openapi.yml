                summary: Default describeApp request
                x-microcks-default: true
                value:
                  appArn: arn:aws:resiliencehub:us-east-1:123456789012:app/my-app
      responses:
        '200':
          description: Application description retrieved.
          content:
            application/json:
              schema:
